<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objectif Santé - Libres ensemble</title>
    <style>
        /* Reset de base et police */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Conteneur de l'image de fond (forêt et rivière) */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Superposition (Overlay) animée pour simuler le flux calme de l'eau */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(0, 74, 97, 0.25), rgba(77, 208, 225, 0.15), rgba(0, 150, 136, 0.2));
            background-size: 400% 400%;
            animation: waterFlowCalm 20s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes waterFlowCalm {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Conteneur principal (Effet Verre Dépoli) */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem 2rem;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 650px;
            width: 100%;
        }

        /* --- SÉLECTEUR DE SUBSTANCE --- */
        .toggle-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 50px;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            padding: 8px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-btn.active.tabac {
            background: #00acc1;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 172, 193, 0.4);
        }

        .toggle-btn.active.cannabis {
            background: #2e7d32;
            color: white;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4);
        }

        /* Bouton Agent IA */
        .ai-agent-wrapper {
            margin-bottom: 1.5rem;
        }
        .btn-ai-agent {
            background: rgba(124, 77, 255, 0.2);
            border: 1px dashed rgba(124, 77, 255, 0.6);
            color: #b39ddb;
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-ai-agent:hover {
            background: rgba(124, 77, 255, 0.35);
            border-color: rgba(124, 77, 255, 1);
            color: #fff;
            transform: translateY(-1px);
        }

        h1 {
            font-size: 2.4rem;
            margin-bottom: 0.8rem;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.95;
            margin-bottom: 2rem;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        /* Grille du compte à rebours */
        .countdown-grid {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-bottom: 2.5rem;
        }

        .time-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem 0.5rem;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
        }

        .number {
            font-size: 3rem;
            font-weight: 700;
            display: block;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        #complete-message {
            font-size: 2rem;
            font-weight: bold;
            display: none;
            margin-bottom: 2.5rem;
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* --- ZONE SIMULATEUR FINANCIER --- */
        #finance-simulator {
            display: none;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 2rem;
            text-align: left;
        }
        .sim-title { font-weight: 600; margin-bottom: 10px; font-size: 1.1rem; text-align: center; color: #4dd0e1; }
        .sim-title.cannabis-theme { color: #81c784; }
        .sim-flex { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; }
        .sim-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); padding: 8px; border-radius: 8px; color: white; width: 90px; font-size: 1rem; text-align: center; }
        .sim-counter { font-size: 1.4rem; font-weight: bold; text-align: center; color: #ffeb3b; text-shadow: 0 2px 4px rgba(0,0,0,0.4); }

        /* --- ZONE DU MENU DE BOUTONS --- */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 1rem;
        }

        #menu-before, #menu-after {
            display: none;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.01);
        }

        .btn-benefit-today { background: rgba(77, 208, 225, 0.25); border-color: rgba(77, 208, 225, 0.4); font-weight: 600; }
        .btn-benefit-today:hover { background: rgba(77, 208, 225, 0.4); }
        .btn-benefit-today.cannabis-theme { background: rgba(46, 125, 50, 0.3); border-color: rgba(46, 125, 50, 0.5); }
        .btn-benefit-today.cannabis-theme:hover { background: rgba(46, 125, 50, 0.45); }

        .btn-panic { background: rgba(239, 83, 80, 0.25); border-color: rgba(239, 83, 80, 0.4); }
        .btn-panic:hover { background: rgba(239, 83, 80, 0.4); border-color: rgba(239, 83, 80, 0.6); }

        .btn-relapse { background: rgba(255, 167, 38, 0.2); border-color: rgba(255, 167, 38, 0.35); }
        .btn-relapse:hover { background: rgba(255, 167, 38, 0.35); border-color: rgba(255, 167, 38, 0.5); }

        /* --- FENÊTRE MODALE --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .modal-content {
            background: rgba(20, 30, 40, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 28px;
            max-width: 850px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 25px;
            font-size: 2.2rem;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .close-modal:hover { opacity: 1; }

        .modal-title {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        
        .modal-title.tabac-theme { color: #4dd0e1; }
        .modal-title.cannabis-theme { color: #81c784; }
        .modal-title.ai-theme { color: #b39ddb; }

        .modal-text {
            font-size: 1.05rem;
            line-height: 1.7;
            text-align: left;
            opacity: 0.95;
        }

        /* --- BLOC ZONE TEXTE PROMPT --- */
        .prompt-textarea {
            width: 100%;
            height: 250px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #e0e0e0;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            resize: none;
            margin-top: 15px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .btn-copy {
            background: #7c4dff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-copy:hover { background: #651fff; }

        .big-benefit-display {
            text-align: center;
            padding: 20px;
            font-size: 1.4rem;
            line-height: 1.6;
            font-weight: 500;
            color: #fff;
        }

        .modal-text p { margin-bottom: 15px; }
        .modal-text ul { margin-left: 22px; margin-top: 10px; margin-bottom: 20px; }
        .modal-text li { margin-bottom: 12px; }
        
        /* Cadre de rappel psychologique d'urgence */
        .live-benefit-reminder {
            background: rgba(255, 235, 59, 0.1);
            border: 1px dashed #ffeb3b;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 1.05rem;
            line-height: 1.5;
        }
        .live-benefit-reminder.panic-mode { border-color: #ef5350; background: rgba(239, 83, 80, 0.08); }
        .live-benefit-reminder.relapse-mode { border-color: #ffa726; background: rgba(255, 167, 38, 0.08); }

        .highlight-box {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #4dd0e1;
            padding: 15px;
            border-radius: 0 12px 12px 0;
            margin: 20px 0;
        }
        .highlight-box.cannabis-theme { border-left-color: #81c784; }

        .timeline { margin-top: 15px; }
        .timeline-item { margin-bottom: 20px; padding-left: 15px; border-left: 2px dashed rgba(255, 255, 255, 0.2); }
        .timeline-time { font-weight: bold; color: #4dd0e1; font-size: 1.1rem; }
        .timeline-time.cannabis-theme { color: #81c784; }

        @media (max-width: 520px) {
            h1 { font-size: 1.8rem; }
            .number { font-size: 2.2rem; }
            .countdown-grid { gap: 8px; }
            .time-box { padding: 1rem 0.2rem; }
            .modal-content { padding: 1.5rem; }
            .sim-flex { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ONGLES DE SÉLECTION D'OBJECTIF -->
        <div class="toggle-container">
            <button id="btn-tabac" class="toggle-btn active tabac" onclick="setSubstance('tabac')">Option Tabac</button>
            <button id="btn-cannabis" class="toggle-btn" onclick="setSubstance('cannabis')">Option Cannabis</button>
        </div>

        <!-- ACCÈS AGENT IA -->
        <div class="ai-agent-wrapper">
            <button class="btn-ai-agent" onclick="openAIModal()">🤖 Activer mon Agent IA de poche</button>
        </div>

        <h1 id="main-title">Le Grand Départ <span id="main-emoji">🚭</span></h1>
        
        <div id="countdown-section">
            <p class="subtitle">Libres, ensemble et à pleins poumons. Le décompte :</p>
            <div id="countdown" class="countdown-grid">
                <div class="time-box"><span class="number" id="days">00</span><span class="label">Jours</span></div>
                <div class="time-box"><span class="number" id="hours">00</span><span class="label">Heures</span></div>
                <div class="time-box"><span class="number" id="minutes">00</span><span class="label">Min</span></div>
                <div class="time-box"><span class="number" id="seconds">00</span><span class="label">Sec</span></div>
            </div>
        </div>

        <div id="complete-message">
            C'est le moment ! Respirez l'air pur de la forêt. 🌱
        </div>

        <!-- BLOC SIMULATEUR FINANCIER -->
        <div id="finance-simulator">
            <div id="sim-title-id" class="sim-title">💰 Mon compteur d'économies</div>
            <div class="sim-flex">
                <label for="monthly-budget">Budget mensuel habituel :</label>
                <input type="number" id="monthly-budget" class="sim-input" value="150" oninput="calculateSavings()"> <span style="font-weight:bold;">€</span>
            </div>
            <div id="savings-display" class="sim-counter">0.00 € économisés</div>
        </div>

        <div class="menu-container">
            <button class="btn" onclick="openBenefitsModal()">📈 Évolution globale des bienfaits</button>
            
            <div id="menu-before">
                <button class="btn" onclick="openModal('prep')">🌱 Se préparer à arrêter</button>
                <button class="btn" onclick="openModal('jour-j')">🚀 Préparer le jour J</button>
            </div>
            <div id="menu-after">
                <button id="btn-today-benefit" class="btn btn-benefit-today" onclick="openTodayBenefitModal()">⭐ Le bienfait du jour</button>
                <button class="btn" onclick="openModal('astuces')">✨ Astuces pour tenir</button>
                <button class="btn btn-panic" onclick="openModal('craquer')">🚨 HEEELP, je vais craquer !</button>
                <button class="btn btn-relapse" onclick="openModal('craque')">❤️ Help, j'ai craqué...</button>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal" onclick="closeModalOutside(event)">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" class="modal-title">Titre</h2>
            <div id="modalText" class="modal-text">Texte</div>
        </div>
    </div>

    <script>
        const targetDate = new Date("August 7, 2026 00:00:01").getTime();
        let currentSubstance = 'tabac'; 

        const countdownSection = document.getElementById("countdown-section");
        const completeMessage = document.getElementById("complete-message");
        const menuBefore = document.getElementById("menu-before");
        const menuAfter = document.getElementById("menu-after");
        const financeSimulator = document.getElementById("finance-simulator");

        const daysEl = document.getElementById("days");
        const hoursEl = document.getElementById("hours");
        const minutesEl = document.getElementById("minutes");
        const secondsEl = document.getElementById("seconds");

        const modal = document.getElementById("infoModal");
        const modalTitle = document.getElementById("modalTitle");
        const modalText = document.getElementById("modalText");

        function setSubstance(type) {
            currentSubstance = type;
            const btnTabac = document.getElementById("btn-tabac");
            const btnCannabis = document.getElementById("btn-cannabis");
            const titleEmoji = document.getElementById("main-emoji");
            const simTitle = document.getElementById("sim-title-id");
            const btnToday = document.getElementById("btn-today-benefit");

            if(type === 'tabac') {
                btnTabac.classList.add("active", "tabac");
                btnCannabis.classList.remove("active", "cannabis");
                titleEmoji.innerText = "🚭";
                simTitle.className = "sim-title";
                btnToday.classList.remove("cannabis-theme");
            } else {
                btnCannabis.classList.add("active", "cannabis");
                btnTabac.classList.remove("active", "tabac");
                titleEmoji.innerText = "🍁";
                simTitle.className = "sim-title cannabis-theme";
                btnToday.classList.add("cannabis-theme");
            }
            calculateSavings();
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference < 0) {
                countdownSection.style.display = "none";
                completeMessage.style.display = "block";
                menuBefore.style.display = "none";
                menuAfter.style.display = "flex";
                financeSimulator.style.display = "block";
                calculateSavings();
                return;
            }

            menuBefore.style.display = "flex";
            menuAfter.style.display = "none";
            financeSimulator.style.display = "none";

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            daysEl.innerText = days < 10 ? "0" + days : days;
            hoursEl.innerText = hours < 10 ? "0" + hours : hours;
            minutesEl.innerText = minutes < 10 ? "0" + minutes : minutes;
            secondsEl.innerText = seconds < 10 ? "0" + seconds : seconds;
        }

        function calculateSavings() {
            const now = new Date().getTime();
            const timePassedMs = now - targetDate;
            if (timePassedMs < 0) return;

            const budgetMensuel = parseFloat(document.getElementById("monthly-budget").value) || 0;
            const msDansUnMois = 30.416 * 24 * 60 * 60 * 1000;
            const budgetParMs = budgetMensuel / msDansUnMois;

            const economise = timePassedMs * budgetParMs;
            document.getElementById("savings-display").innerText = economise.toFixed(2) + " € économisés";
        }

        // STRUCTURE DES BIENFAITS PAR PALIERS (EN JOURS SIMPLES POUR LE FILTRAGE DYNAMIQUE)
        const timelineData = {
            'tabac': [
                { days: 0, timeLabel: "20 min à 24h", text: "Le rythme cardiaque se stabilise, le monoxyde de carbone est rejeté et les poumons commencent leur grand nettoyage." },
                { days: 2, timeLabel: "48 heures", text: "La nicotine a totalement quitté le corps. Le goût et l'odorat redeviennent incroyablement précis." },
                { days: 14, timeLabel: "2 semaines", text: "La fonction pulmonaire remonte. Le sang circule mieux, les muscles fatiguent moins vite lors des efforts." },
                { days: 21, timeLabel: "3 à 4 semaines", text: "Le sommeil profond se stabilise, la dépendance psychologique faiblit et les cils vibratiles se reconstruisent." },
                { days: 45, timeLabel: "1 à 2 mois", text: "La toux de nettoyage disparaît complètement. La voix est plus claire, le teint est lumineux et les économies explosent." },
                { days: 90, timeLabel: "3 mois", text: "Votre capacité respiratoire s'est accrue de près de 30%. Le risque de crise cardiaque a déjà diminué de moitié. Vous êtes solidement ancré dans votre liberté." }
            ],
            'cannabis': [
                { days: 0, timeLabel: "Jour 1 à 3", text: "Élimination complète du monoxyde de carbone. Le brouillard mental matinal commence à se dissiper, la concentration revient." },
                { days: 7, timeLabel: "1 semaine", text: "Le sommeil paradoxal se restructure. Les rêves deviennent extrêmement vivants et le sommeil est enfin réparateur." },
                { days: 14, timeLabel: "2 à 3 semaines", text: "La mémoire à court terme redevient hautement performante. La motivation naturelle (production de dopamine) se rééquilibre." },
                { days: 30, timeLabel: "1 mois", text: "Le THC accumulé dans les tissus adipeux est en très grande partie évacué. L'anxiété ou l'irritabilité du sevrage disparaissent complètement." },
                { days: 60, timeLabel: "2 à 3 mois", text: "Vos récepteurs cérébraux ont retrouvé leur état initial stable. Votre énergie, votre niveau de créativité et votre réactivité cognitive sont à leur maximum de potentiel. Vous êtes totalement libre." }
            ]
        };

        const contentData = {
            'tabac': {
                'prep': {
                    title: "🌱 Se préparer à arrêter le Tabac",
                    text: `<p>Un sevrage bien planifié augmente considérablement la réussite de l'équipe. Voici la feuille de route d'ici le 7 août :</p>
                           <ul>
                               <li><b>Listez vos piliers de motivation :</b> Notez-les précisément (liberté, souffle retrouvé, économies).</li>
                               <li><b>Réfléchissez aux outils d'aide :</b> Évaluez si vous aurez besoin de substituts nicotiniques (patchs, gommes, sprays) pour atténuer le manque physique du matin.</li>
                               <li><b>Cartographiez vos habitudes :</b> Notez les cigarettes les plus rituelles afin de prévoir une alternative pour chacune d'elles.</li>
                               <li><b>Faites place nette :</b> La veille de la date fatidique, débarrassez-vous de l'intégralité de vos paquets, cendriers et briquets.</li>
                           </ul>`
                },
                'jour-j': {
                    title: "🚀 Préparer le Jour J (Tabac)",
                    text: `<p>Le jour où le compteur atteindra zéro, l'objectif sera simple : tenir les premières 24 heures sans toucher à une seule cigarette. Voici le plan validé pour ce jour-là :</p>
                           <ul>
                               <li><b>Briser les automatismes :</b> Il faudra immédiatement changer les rituels du matin. Par exemple, prendre sa douche directement au réveil, remplacer le café matinal par un grand verre d'eau ou un jus d'agrume frais.</li>
                               <li><b>Le brossage réflexe :</b> Dès la fin d'un repas, la consigne sera d'aller directement se brosser les dents. La fraîcheur de la menthe coupe efficacement l'envie réflexe d'allumer une cigarette.</li>
                               <li><b>Gérer la nervosité :</b> Si une tension apparaît, c'est le signal que le corps élimine les toxines. Utilisez vos substituts dès le matin si vous en avez prévu.</li>
                           </ul>`
                },
                'astuces': {
                    title: "✨ Astuces pour maintenir votre liberté",
                    text: `<p>Le besoin impérieux de fumer s'apparente à une vague : il culmine intensément mais s'effondre en seulement <b>3 à 5 minutes</b>. Appliquez ces méthodes de dérivation :</p>
