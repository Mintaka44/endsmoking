<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objectif Santé - Libres ensemble</title>
    <style>
        /* Reset de base et police */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Conteneur de l'image de fond (forêt et rivière) */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Superposition (Overlay) animée pour simuler le flux calme de l'eau */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(0, 74, 97, 0.25), rgba(77, 208, 225, 0.15), rgba(0, 150, 136, 0.2));
            background-size: 400% 400%;
            animation: waterFlowCalm 20s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes waterFlowCalm {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Conteneur principal (Effet Verre Dépoli) */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem 2rem;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 650px;
            width: 100%;
        }

        h1 {
            font-size: 2.4rem;
            margin-bottom: 0.8rem;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.95;
            margin-bottom: 2rem;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        /* Grille du compte à rebours */
        .countdown-grid {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-bottom: 2.5rem;
        }

        .time-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem 0.5rem;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
        }

        .number {
            font-size: 3rem;
            font-weight: 700;
            display: block;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        /* Message de fin */
        #complete-message {
            font-size: 2rem;
            font-weight: bold;
            display: none;
            margin-bottom: 2.5rem;
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* --- ZONE DU MENU DE BOUTONS --- */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 1rem;
        }

        #menu-before, #menu-after {
            display: none;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.01);
        }

        .btn-panic { background: rgba(239, 83, 80, 0.25); border-color: rgba(239, 83, 80, 0.4); }
        .btn-panic:hover { background: rgba(239, 83, 80, 0.4); border-color: rgba(239, 83, 80, 0.6); }

        .btn-relapse { background: rgba(255, 167, 38, 0.2); border-color: rgba(255, 167, 38, 0.35); }
        .btn-relapse:hover { background: rgba(255, 167, 38, 0.35); border-color: rgba(255, 167, 38, 0.5); }

        /* --- FENÊTRE MODALE PLUS GRANDE --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .modal-content {
            background: rgba(20, 30, 40, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 28px;
            max-width: 850px; /* Agrandissement significatif */
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 25px;
            font-size: 2.2rem;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .close-modal:hover { opacity: 1; }

        .modal-title {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #4dd0e1;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .modal-text {
            font-size: 1.05rem;
            line-height: 1.7;
            text-align: left;
            opacity: 0.95;
        }

        .modal-text p {
            margin-bottom: 15px;
        }

        .modal-text ul {
            margin-left: 22px;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .modal-text li {
            margin-bottom: 12px;
        }
        
        .highlight-box {
            background: rgba(77, 208, 225, 0.1);
            border-left: 4px solid #4dd0e1;
            padding: 15px;
            border-radius: 0 12px 12px 0;
            margin: 20px 0;
        }

        /* Responsive */
        @media (max-width: 520px) {
            h1 { font-size: 1.8rem; }
            .number { font-size: 2.2rem; }
            .countdown-grid { gap: 8px; }
            .time-box { padding: 1rem 0.2rem; }
            .modal-content { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Le Grand Départ 🚭</h1>
        
        <div id="countdown-section">
            <p class="subtitle">Libres, ensemble et à pleins poumons. Le décompte :</p>
            <div id="countdown" class="countdown-grid">
                <div class="time-box"><span class="number" id="days">00</span><span class="label">Jours</span></div>
                <div class="time-box"><span class="number" id="hours">00</span><span class="label">Heures</span></div>
                <div class="time-box"><span class="number" id="minutes">00</span><span class="label">Min</span></div>
                <div class="time-box"><span class="number" id="seconds">00</span><span class="label">Sec</span></div>
            </div>
        </div>

        <div id="complete-message">
            C'est le moment ! Respirez l'air pur de la forêt. 🌱
        </div>

        <div class="menu-container">
            <div id="menu-before">
                <button class="btn" onclick="openModal('prep')">🌱 Se préparer à arrêter</button>
                <button class="btn" onclick="openModal('jour-j')">🚀 Le jour J : Mode d'emploi</button>
            </div>
            <div id="menu-after">
                <button class="btn" onclick="openModal('astuces')">✨ Astuces pour tenir</button>
                <button class="btn btn-panic" onclick="openModal('craquer')">🚨 HEEELP, je vais craquer !</button>
                <button class="btn btn-relapse" onclick="openModal('craque')">❤️ Help, j'ai craqué...</button>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal" onclick="closeModalOutside(event)">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" class="modal-title">Titre</h2>
            <div id="modalText" class="modal-text">Texte</div>
        </div>
    </div>

    <script>
        const targetDate = new Date("August 7, 2026 00:01:00").getTime();

        const countdownSection = document.getElementById("countdown-section");
        const completeMessage = document.getElementById("complete-message");
        const menuBefore = document.getElementById("menu-before");
        const menuAfter = document.getElementById("menu-after");

        const daysEl = document.getElementById("days");
        const hoursEl = document.getElementById("hours");
        const minutesEl = document.getElementById("minutes");
        const secondsEl = document.getElementById("seconds");

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference < 0) {
                countdownSection.style.display = "none";
                completeMessage.style.display = "block";
                menuBefore.style.display = "none";
                menuAfter.style.display = "flex";
                clearInterval(intervalId);
                return;
            }

            menuBefore.style.display = "flex";
            menuAfter.style.display = "none";

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            daysEl.innerText = days < 10 ? "0" + days : days;
            hoursEl.innerText = hours < 10 ? "0" + hours : hours;
            minutesEl.innerText = minutes < 10 ? "0" + minutes : minutes;
            secondsEl.innerText = seconds < 10 ? "0" + seconds : seconds;
        }

        // TEXTES STRUCTURÉS SELON LES CONSEILS OFFICIELS DE TABAC INFO SERVICE
        const contentData = {
            'prep': {
                title: "🌱 Se préparer à arrêter (Conseils Tabac Info Service)",
                text: `<p>Un arrêt bien préparé multiplie drastiquement vos chances de réussite. D'ici le 7 août, travaillez votre stratégie en équipe :</p>
                       <ul>
                           <li><b>Faites le point sur vos motivations :</b> Notez-les par écrit (santé, budget, liberté). Relisez-les ensemble lorsque vous doutez.</li>
                           <li><b>Évaluez votre dépendance :</b> Si vous fumez dès le réveil, une béquille (substituts nicotiniques comme les patchs ou gommes) peut être votre meilleure alliée. N'hésitez pas à consulter un professionnel de santé.</li>
                           <li><b>Identifiez vos habitudes et automatismes :</b> Repérez à quelles situations ou émotions chaque cigarette est associée (stress, café, alcool, ennui) pour planifier à l'avance des comportements de remplacement.</li>
                           <li><b>Éliminez la tentation :</b> Jetez absolument tout ce qui rappelle le tabac (paquets, briquets, cendriers) pour que votre environnement devienne une zone saine de respiration.</li>
                       </ul>`
            },
            'jour-j': {
                title: "🚀 Le jour J : Mode d'emploi",
                text: `<p>Aujourd'hui, c'est le grand saut. Pas besoin de penser aux mois à venir, concentrez-vous uniquement sur **les prochaines 24 heures** :</p>
                       <ul>
                           <li><b>Modifiez votre routine :</b> Rompez immédiatement vos rituels du matin. Prenez votre petit-déjeuner dans une autre pièce, buvez un thé plutôt qu'un café, ou brossez-vous les dents directement après le repas.</li>
                           <li><b>Anticipez les symptômes de sevrage :</b> L'irritabilité, la fatigue ou la toux sont des réactions normales de votre corps qui se purifie. Ils vont s'atténuer rapidement au fil des jours.</li>
                           <li><b>Utilisez vos substituts dès le matin :</b> Si vous avez opté pour des patchs, appliquez-les sans attendre pour éviter que le manque physique ne s'installe.</li>
                           <li><b>Faites corps avec le groupe :</b> Envoyez un message d'étape à vos amis à chaque victoire de la journée (matinée validée, fin du repas sans fumer...). Votre réussite collective commence ici.</li>
                       </ul>`
            },
            'astuces': {
                title: "✨ Astuces comportementales pour tenir",
                text: `<p>Le saviez-vous ? Une envie forte de fumer (le "craving") est transitoire. Elle dure rarement plus de **3 à 5 minutes**. Votre mission est de faire diversion pendant ce court laps de temps :</p>
                       <ul>
                           <li><b>La stratégie des 4 D de Tabac Info Service :</b>
                               <br>• <b>D</b>ifférer : Attendez 5 minutes avant de réagir, l'envie va culminer puis chuter.
                               <br>• <b>D</b>écompresser : Prenez de grandes inspirations ventrales profondes.
                               <br>• <b>D</b>ire : Discutez avec un ami ou le groupe pour extérioriser le moment.
                               <br>• <b>D</b>ivertir : Changez radicalement d'activité (marchez, faites un jeu sur téléphone, dessinez).
                           </li>
                           <li><b>Évitez les situations à haut risque :</b> Durant les premières semaines, réduisez temporairement les contextes très associés au tabac (comme les soirées alcoolisées) ou prévoyez un plan B non-fumeur.</li>
                           <li><b>Récompensez-vous :</b> Mettez l'argent économisé dans une cagnotte visible. Utilisez-le pour vous offrir un plaisir commun ou individuel. Votre corps et votre portefeuille vous remercient !</li>
                       </ul>`
            },
            'craquer': {
                title: "🚨 HEEELP, je vais craquer !",
                text: `<p><b>STOP. Ne bougez plus et lisez ceci.</b> L'envie que vous ressentez en ce moment est une réaction chimique passagère, pas un besoin vital.</p>
                       <div class="highlight-box">
                           <b>L'exercice de respiration d'urgence :</b> Inspirez profondément par le nez en gonflant le ventre pendant 4 secondes, bloquez votre respiration pendant 4 secondes, puis expirez très lentement par la bouche pendant 6 secondes. Répétez cela 5 fois.
                       </div>
                       <p><b>Vos actions immédiates :</b></p>
                       <ul>
                           <li><b>Fuyez la situation :</b> Changez immédiatement d'environnement (sortez marcher, changez de pièce, passez-vous de l'eau fraîche sur le visage).</li>
                           <li><b>Occupez votre bouche et vos mains :</b> Buvez un grand verre d'eau par petites gorgées, mâchez un chewing-gum, ou manipulez un objet (une balle anti-stress).</li>
                           <li><b>Alertez l'équipe :</b> Envoyez un SOS sur votre groupe de messagerie. Vos amis sont là pour vous rappeler pourquoi vous avez commencé cette aventure.</li>
                       </ul>`
            },
            'craque': {
                title: "❤️ Oups, j'ai fait un faux pas...",
                text: `<p>Vous avez fumé une cigarette ou pris une bouffée ? **Ne culpabilisez pas et ne baissez pas les bras.** Une baisse de vigilance ne remet absolument pas en cause tout votre parcours.</p>
                       <ul>
                           <li><b>Évitez le piège du 'foutu pour foutu' :</b> Fumer une cigarette est un accident de parcours, pas une reprise définitive. Posez ou jetez immédiatement le reste du paquet. Votre démarche reste totalement active.</li>
                           <li><b>Analysez les faits avec bienveillance :</b> Qu'est-ce qui a provoqué ce faux pas ? Un pic de stress ? La présence d'un autre fumeur ? Une émotion particulière ? Comprendre ce déclencheur vous permettra de mieux le contrer la prochaine fois.</li>
                           <li><b>Ajustez votre aide :</b> Si le manque physique était trop fort, c'est peut-être que le dosage de vos substituts (patchs, gommes) est trop faible. Prenez conseil auprès d'un pharmacien ou d'un tabacologue.</li>
                           <li><b>Rejoignez le groupe :</b> Dites-le à vos amis sans honte. L'honnêteté renforce le collectif, et ils sauront vous redonner l'élan nécessaire pour repartir de plus belle. Le compteur tourne toujours, on ne lâche rien !</li>
                       </ul>`
            }
        };

        const modal = document.getElementById("infoModal");
        const modalTitle = document.getElementById("modalTitle");
        const modalText = document.getElementById("modalText");

        function openModal(key) {
            modalTitle.innerHTML = contentData[key].title;
            modalText.innerHTML = contentData[key].text;
            modal.style.display = "flex";
        }

        function closeModal() {
            modal.style.display = "none";
        }

        function closeModalOutside(event) {
            if (event.target === modal) {
                closeModal();
            }
        }

        const intervalId = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
